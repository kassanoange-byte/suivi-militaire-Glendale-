<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Entraînement Militaire</title>
    <!-- Intégration d'une police moderne et d'icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shine: rgba(255, 255, 255, 0.2);
            --green-glow: rgba(16, 185, 129, 0.25);
            --red-glow: rgba(239, 68, 68, 0.25);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Conteneur Principal style iOS */
        .app-container {
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 var(--glass-shine);
            position: relative;
        }

        /* Cercles 3D en arrière-plan pour accentuer l'effet verre */
        .bg-glow-1, .bg-glow-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }
        .bg-glow-1 {
            width: 200px;
            height: 200px;
            background: #4f46e5;
            top: -50px;
            left: -50px;
            opacity: 0.4;
        }
        .bg-glow-2 {
            width: 250px;
            height: 250px;
            background: #db2777;
            bottom: -80px;
            right: -80px;
            opacity: 0.3;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Sections de l'application */
        .section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Inputs & Boutons */
        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 14px 14px 44px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        button {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Zone de Résultat */
        #result-zone {
            display: none;
            margin-top: 16px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .status-card {
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
            backdrop-filter: blur(10px);
        }

        /* Statut Validé (Vert) */
        .status-card.success {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 8px 32px var(--green-glow);
        }

        .status-card.success h3 {
            color: #34d399;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .status-card.success .badge {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        /* Statut Refusé (Rouge) */
        .status-card.danger {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 8px 32px var(--red-glow);
        }

        .status-card.danger h3 {
            color: #f87171;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .status-card.danger .badge {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .status-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .status-card.success .status-icon { color: #10b981; }
        .status-card.danger .status-icon { color: #ef4444; }

        /* Animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Notifications de validation d'ajout */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 40px;
            color: var(--text-main);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- Effets de fond de l'application -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="app-container">
        <header>
            <h1>S.V.E. MILITAIRE</h1>
            <p>Suivi de Validation des Entraînements</p>
        </header>

        <!-- Formulaire d'Enregistrement -->
        <div class="section">
            <h2 class="section-title"><i class="fa-solid fa-user-plus"></i> Enregistrer une séance</h2>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="soldier-name" placeholder="Nom complet du soldat..." autocomplete="off">
            </div>
            <button onclick="registerTraining()">
                <i class="fa-solid fa-plus"></i> Valider l'entraînement
            </button>
        </div>

        <!-- Formulaire de Vérification -->
        <div class="section" style="margin-bottom: 0;">
            <h2 class="section-title"><i class="fa-solid fa-shield-halved"></i> Vérification du statut</h2>
            <div class="input-group">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-name" placeholder="Rechercher un soldat..." oninput="checkStatus()">
            </div>
            
            <!-- Zone de résultat dynamique -->
            <div id="result-zone">
                <!-- Généré dynamiquement en JS -->
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-check" style="color: #34d399;"></i>
        <span id="toast-message">Entraînement enregistré !</span>
    </div>

    <script>
        // Récupération de la base de données locale ou création d'une nouvelle
        let database = JSON.parse(localStorage.getItem('militaryTrainings')) || {};

        // Fonction pour enregistrer une séance
        function registerTraining() {
            const input = document.getElementById('soldier-name');
            const rawName = input.value.trim();

            if (rawName === "") {
                alert("Veuillez entrer un nom valide.");
                return;
            }

            // Normalisation du nom pour éviter les erreurs de casse (ex: "Dupont" vs "dupont")
            const formattedName = rawName.toUpperCase();

            // Incrémentation du compteur
            if (database[formattedName]) {
                database[formattedName] += 1;
            } else {
                database[formattedName] = 1;
            }

            // Sauvegarde locale
            localStorage.setItem('militaryTrainings', JSON.stringify(database));

            // Feedback visuel (Toast)
            showToast(`${rawName} : ${database[formattedName]} entraînement(s)`);

            // Réinitialisation de l'input et mise à jour de la recherche si elle est active
            input.value = "";
            checkStatus(); 
        }

        // Fonction pour vérifier le statut d'un soldat en temps réel
        function checkStatus() {
            const searchInput = document.getElementById('search-name');
            const resultZone = document.getElementById('result-zone');
            const query = searchInput.value.trim().toUpperCase();

            if (query === "") {
                resultZone.style.display = "none";
                return;
            }

            resultZone.style.display = "block";
            const count = database[query] || 0;

            if (count >= 5) {
                // Succès : Effet Glace Vert brillant
                resultZone.innerHTML = `
                    <div class="status-card success">
                        <div class="status-icon"><i class="fa-solid fa-circle-check"></i></div>
                        <h3>ACCÈS VALIDÉ</h3>
                        <p style="font-size: 14px; opacity: 0.9;">Le soldat <strong>${query}</strong> est apte.</p>
                        <span class="badge">${count} ENTRAÎNEMENTS</span>
                    </div>
                `;
            } else {
                // Échec : Effet Glace Rouge brillant
                const missing = 5 - count;
                resultZone.innerHTML = `
                    <div class="status-card danger">
                        <div class="status-icon"><i class="fa-solid fa-circle-xmark"></i></div>
                        <h3>ACCÈS REFUSÉ</h3>
                        <p style="font-size: 14px; opacity: 0.9;"><strong>${query}</strong> n'a pas atteint l'objectif.</p>
                        <p style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Manque encore ${missing} séance(s).</p>
                        <span class="badge">${count} / 5 COMPLÉTÉ</span>
                    </div>
                `;
            }
        }

        // Système de notification Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
